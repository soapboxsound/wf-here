    <h1 class="admin-queue-title">Listings manager</h1>
    <p class="admin-queue-count" id="listingsCount">0 listings</p>
    <p class="admin-queue-count" id="listingsSummary"></p>

    <div class="admin-filters" id="cityFilters">
      <button class="admin-filter-btn is-active" type="button" data-city="all">All cities</button>
      <button class="admin-filter-btn" type="button" data-city="new-york">New York</button>
      <button class="admin-filter-btn" type="button" data-city="los-angeles">Los Angeles</button>
    </div>

    <div class="admin-filters" id="statusFilters">
      <button class="admin-filter-btn" type="button" data-status="all">All statuses</button>
      <button class="admin-filter-btn" type="button" data-status="approved">Published</button>
      <button class="admin-filter-btn is-active" type="button" data-status="unpublished">Unpublished</button>
    </div>

    <div class="admin-filters" id="chainFilters">
      <button class="admin-filter-btn is-active" type="button" data-chain="all">All names</button>
      <button class="admin-filter-btn" type="button" data-chain="chains">Chains only</button>
      <button class="admin-filter-btn" type="button" data-chain="unique">Unique names only</button>
    </div>

    <div class="admin-filters" id="duplicateFilters">
      <button class="admin-filter-btn is-active" type="button" data-duplicate="all">All listings</button>
      <button class="admin-filter-btn" type="button" data-duplicate="coords">Duplicate coordinates</button>
      <button class="admin-filter-btn" type="button" data-duplicate="placeid">Duplicate Place IDs</button>
    </div>

    <div class="admin-filters admin-neighborhood-filters" id="neighborhoodFilters"></div>

    <div class="import-actions admin-listings-actions">
      <button class="listing-btn listing-btn-feature" id="fillNeighborhoodsBtn" type="button">Fill missing neighborhoods</button>
      <button class="listing-btn listing-btn-delete" id="deleteCoordDupesBtn" type="button">Delete coordinate duplicates</button>
    </div>

    <div id="listingsList"></div>

  <script src="/js/main.js"></script>
  <script type="module" src="/js/nav-auth.js"></script>
  <script type="module">
    import { deleteListing, getAdminListings, updateListing } from "/js/db.js";

    const NEEDS_NEIGHBORHOOD = "Needs neighborhood";
    const NEIGHBORHOOD_BATCH_SIZE = 20;

    const listingsCount = document.getElementById("listingsCount");
    const listingsSummary = document.getElementById("listingsSummary");
    const listingsList = document.getElementById("listingsList");
    const cityFilters = document.getElementById("cityFilters");
    const statusFilters = document.getElementById("statusFilters");
    const chainFilters = document.getElementById("chainFilters");
    const duplicateFilters = document.getElementById("duplicateFilters");
    const neighborhoodFilters = document.getElementById("neighborhoodFilters");
    const fillNeighborhoodsBtn = document.getElementById("fillNeighborhoodsBtn");
    const deleteCoordDupesBtn = document.getElementById("deleteCoordDupesBtn");

    const cityLabels = {
      "new-york": "New York",
      "los-angeles": "Los Angeles"
    };

    let listings = [];
    let nameCounts = new Map();
    let coordCounts = new Map();
    let placeIdCounts = new Map();
    let activeCity = "all";
    let activeStatus = "unpublished";
    let activeChain = "all";
    let activeDuplicate = "all";
    let activeNeighborhood = "all";

    function formatType(type = "") {
      return type
        .replace(/-/g, " ")
        .replace(/\b\w/g, (char) => char.toUpperCase());
    }

    function normalizeName(name = "") {
      return name
        .toLowerCase()
        .replace(/&/g, " and ")
        .replace(/[^a-z0-9]+/g, " ")
        .trim();
    }

    function coordKey(listing) {
      const lat = Number(listing.lat);
      const lng = Number(listing.lng);

      if (!Number.isFinite(lat) || !Number.isFinite(lng) || (lat === 0 && lng === 0)) {
        return "";
      }

      return `${lat.toFixed(5)},${lng.toFixed(5)}`;
    }

    function neighborhoodLabel(listing) {
      return (listing.neighborhood || "").trim() || NEEDS_NEIGHBORHOOD;
    }

    function rebuildNameCounts() {
      nameCounts = new Map();
      coordCounts = new Map();
      placeIdCounts = new Map();

      listings.forEach((listing) => {
        const nameKey = normalizeName(listing.name);
        if (nameKey) {
          nameCounts.set(nameKey, (nameCounts.get(nameKey) || 0) + 1);
        }

        const coords = coordKey(listing);
        if (coords) {
          coordCounts.set(coords, (coordCounts.get(coords) || 0) + 1);
        }

        const placeId = (listing.googlePlaceId || "").trim();
        if (placeId) {
          placeIdCounts.set(placeId, (placeIdCounts.get(placeId) || 0) + 1);
        }
      });
    }

    function getChainCount(listing) {
      return nameCounts.get(normalizeName(listing.name)) || 1;
    }

    function isChain(listing) {
      return getChainCount(listing) > 1;
    }

    function getCoordDuplicateCount(listing) {
      const key = coordKey(listing);
      return key ? coordCounts.get(key) || 1 : 1;
    }

    function isCoordDuplicate(listing) {
      return getCoordDuplicateCount(listing) > 1;
    }

    function getPlaceIdDuplicateCount(listing) {
      const placeId = (listing.googlePlaceId || "").trim();
      return placeId ? placeIdCounts.get(placeId) || 1 : 1;
    }

    function isPlaceIdDuplicate(listing) {
      return getPlaceIdDuplicateCount(listing) > 1;
    }

    function isDuplicateMatch(listing) {
      if (activeDuplicate === "coords") {
        return isCoordDuplicate(listing);
      }

      if (activeDuplicate === "placeid") {
        return isPlaceIdDuplicate(listing);
      }

      return true;
    }

    function listingQualityScore(listing) {
      let score = 0;

      if (listing.status === "approved") {
        score += 100;
      }

      if (listing.featured) {
        score += 20;
      }

      if (listing.googlePlaceId) {
        score += 15;
      }

      if (listing.neighborhood?.trim()) {
        score += 10;
      }

      if (listing.address?.trim()) {
        score += 10;
      }

      if (listing.hours?.trim()) {
        score += 5;
      }

      if (listing.wifiNetwork?.trim()) {
        score += 5;
      }

      if (Array.isArray(listing.photos) && listing.photos.length) {
        score += 5;
      }

      return score;
    }

    function getCoordinateDuplicateRemovals(sourceListings = listings) {
      const groups = new Map();

      sourceListings.forEach((listing) => {
        const key = coordKey(listing);
        if (!key) {
          return;
        }

        if (!groups.has(key)) {
          groups.set(key, []);
        }

        groups.get(key).push(listing);
      });

      const toDelete = [];

      groups.forEach((group) => {
        if (group.length < 2) {
          return;
        }

        const ranked = [...group].sort((a, b) => {
          const scoreDiff = listingQualityScore(b) - listingQualityScore(a);
          if (scoreDiff) {
            return scoreDiff;
          }

          return (a.name || "").localeCompare(b.name || "") || (a.slug || "").localeCompare(b.slug || "");
        });

        toDelete.push(...ranked.slice(1));
      });

      return toDelete;
    }

    function showToast(message, type = "success") {
      const toast = document.createElement("div");
      toast.className = `admin-toast ${type === "success" ? "is-success" : "is-muted"}`;
      toast.textContent = message;
      document.body.appendChild(toast);

      window.setTimeout(() => {
        toast.remove();
      }, 3000);
    }

    function getCityStatusFiltered() {
      return listings.filter((listing) => {
        const cityMatch = activeCity === "all" || listing.city === activeCity;
        const statusMatch = activeStatus === "all" || listing.status === activeStatus;
        return cityMatch && statusMatch;
      });
    }

    function getFilteredListings() {
      return getCityStatusFiltered().filter((listing) => {
        const chainMatch =
          activeChain === "all" ||
          (activeChain === "chains" && isChain(listing)) ||
          (activeChain === "unique" && !isChain(listing));

        const neighborhoodMatch =
          activeNeighborhood === "all" ||
          neighborhoodLabel(listing) === activeNeighborhood;

        return chainMatch && neighborhoodMatch && isDuplicateMatch(listing);
      });
    }

    function groupByNeighborhood(filtered) {
      const groups = new Map();

      filtered.forEach((listing) => {
        const key = neighborhoodLabel(listing);
        if (!groups.has(key)) {
          groups.set(key, []);
        }
        groups.get(key).push(listing);
      });

      groups.forEach((items) => {
        items.sort((a, b) => {
          const coordDupDiff = Number(isCoordDuplicate(b)) - Number(isCoordDuplicate(a));
          if (coordDupDiff) {
            return coordDupDiff;
          }

          const chainDiff = Number(isChain(b)) - Number(isChain(a));
          if (chainDiff) {
            return chainDiff;
          }

          return (a.name || "").localeCompare(b.name || "");
        });
      });

      return Array.from(groups.entries()).sort(([a], [b]) => {
        if (a === NEEDS_NEIGHBORHOOD) {
          return -1;
        }

        if (b === NEEDS_NEIGHBORHOOD) {
          return 1;
        }

        return a.localeCompare(b);
      });
    }

    function groupByDuplicateKey(filtered) {
      const groups = new Map();

      filtered.forEach((listing) => {
        const key =
          activeDuplicate === "placeid"
            ? (listing.googlePlaceId || "").trim() || "No Place ID"
            : coordKey(listing) || "No coordinates";

        if (!groups.has(key)) {
          groups.set(key, []);
        }
        groups.get(key).push(listing);
      });

      groups.forEach((items) => {
        items.sort((a, b) => (a.name || "").localeCompare(b.name || ""));
      });

      return Array.from(groups.entries()).sort(([, aItems], [, bItems]) => {
        return bItems.length - aItems.length || (aItems[0]?.name || "").localeCompare(bItems[0]?.name || "");
      });
    }

    function updateCount() {
      const filtered = getFilteredListings();
      const chainCount = filtered.filter(isChain).length;
      const coordDupCount = filtered.filter(isCoordDuplicate).length;
      const missingNeighborhood = filtered.filter(
        (listing) => !listing.neighborhood?.trim()
      ).length;

      listingsCount.textContent = `${filtered.length} listing${filtered.length === 1 ? "" : "s"}`;
      listingsSummary.textContent = [
        `${coordDupCount} with duplicate coordinates`,
        `${chainCount} possible chain spot${chainCount === 1 ? "" : "s"}`,
        `${missingNeighborhood} missing neighborhood`
      ].join(" · ");
    }

    function renderNeighborhoodFilterButtons() {
      const baseListings = getCityStatusFiltered().filter((listing) => {
        const chainMatch =
          activeChain === "all" ||
          (activeChain === "chains" && isChain(listing)) ||
          (activeChain === "unique" && !isChain(listing));

        return chainMatch && isDuplicateMatch(listing);
      });

      const counts = new Map();
      baseListings.forEach((listing) => {
        const label = neighborhoodLabel(listing);
        counts.set(label, (counts.get(label) || 0) + 1);
      });

      const neighborhoods = Array.from(counts.keys()).sort((a, b) => {
        if (a === NEEDS_NEIGHBORHOOD) {
          return -1;
        }

        if (b === NEEDS_NEIGHBORHOOD) {
          return 1;
        }

        return a.localeCompare(b);
      });

      if (activeNeighborhood !== "all" && !counts.has(activeNeighborhood)) {
        activeNeighborhood = "all";
      }

      neighborhoodFilters.innerHTML = "";
      neighborhoodFilters.hidden = activeDuplicate !== "all";

      if (activeDuplicate !== "all") {
        return;
      }

      const allButton = document.createElement("button");
      allButton.className = `admin-filter-btn ${activeNeighborhood === "all" ? "is-active" : ""}`;
      allButton.type = "button";
      allButton.dataset.neighborhood = "all";
      allButton.textContent = `All neighborhoods (${baseListings.length})`;
      neighborhoodFilters.appendChild(allButton);

      neighborhoods.forEach((name) => {
        const button = document.createElement("button");
        button.className = `admin-filter-btn ${activeNeighborhood === name ? "is-active" : ""}`;
        button.type = "button";
        button.dataset.neighborhood = name;
        button.textContent = `${name} (${counts.get(name)})`;
        neighborhoodFilters.appendChild(button);
      });
    }

    function renderEmptyState() {
      listingsList.innerHTML = "";

      const empty = document.createElement("div");
      empty.className = "admin-queue-empty";
      empty.innerHTML = `
        <svg width="32" height="32" viewBox="0 0 14 22" fill="none" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M0 7C0 3.134 3.134 0 7 0C10.866 0 14 3.134 14 7C14 8.486 13.519 9.859 12.702 10.976L7 22L1.298 10.976C0.481 9.859 0 8.486 0 7ZM7 10C8.657 10 10 8.657 10 7C10 5.343 8.657 4 7 4C5.343 4 4 5.343 4 7C4 8.657 5.343 10 7 10Z" fill="currentColor"/></svg>
      `;

      const message = document.createElement("p");
      message.textContent = listings.length
        ? "No listings match these filters."
        : "No listings loaded.";
      empty.appendChild(message);

      if (listings.length) {
        const reset = document.createElement("button");
        reset.type = "button";
        reset.className = "listing-btn listing-btn-edit";
        reset.textContent = "Reset filters";
        reset.addEventListener("click", () => {
          activeCity = "all";
          activeStatus = "all";
          activeChain = "all";
          activeDuplicate = "all";
          activeNeighborhood = "all";
          setActiveFilter(cityFilters, cityFilters.querySelector('[data-city="all"]'));
          setActiveFilter(statusFilters, statusFilters.querySelector('[data-status="all"]'));
          setActiveFilter(chainFilters, chainFilters.querySelector('[data-chain="all"]'));
          setActiveFilter(duplicateFilters, duplicateFilters.querySelector('[data-duplicate="all"]'));
          renderListings();
        });
        empty.appendChild(reset);
      }

      listingsList.appendChild(empty);
    }

    function renderListings() {
      const filtered = getFilteredListings();
      updateCount();
      renderNeighborhoodFilterButtons();

      if (!filtered.length) {
        renderEmptyState();
        return;
      }

      listingsList.innerHTML = "";
      const groups =
        activeDuplicate === "all" ? groupByNeighborhood(filtered) : groupByDuplicateKey(filtered);

      groups.forEach(([groupName, items]) => {
        const section = document.createElement("section");
        section.className = "admin-neighborhood-section";

        const heading = document.createElement("div");
        heading.className = "admin-neighborhood-heading";

        const title = document.createElement("h2");
        title.textContent =
          activeDuplicate === "coords"
            ? `Coordinates ${groupName}`
            : activeDuplicate === "placeid"
              ? `Place ID ${groupName}`
              : groupName;

        const count = document.createElement("span");
        count.textContent = `${items.length} spot${items.length === 1 ? "" : "s"}`;

        heading.appendChild(title);
        heading.appendChild(count);
        section.appendChild(heading);

        const list = document.createElement("div");
        list.className = "admin-neighborhood-list";
        items.forEach((listing) => {
          list.appendChild(renderListingCard(listing));
        });

        section.appendChild(list);
        listingsList.appendChild(section);
      });
    }

    function renderListingCard(listing) {
      const card = document.createElement("article");
      card.className = "listing-card";
      card.dataset.id = listing.id;

      if (listing.featured) {
        card.classList.add("is-featured");
      }

      if (listing.status === "unpublished") {
        card.classList.add("is-unpublished");
      }

      if (isChain(listing)) {
        card.classList.add("is-chain");
      }

      if (isCoordDuplicate(listing) || isPlaceIdDuplicate(listing)) {
        card.classList.add("is-duplicate-listing");
      }

      const isPublished = listing.status === "approved";
      const statusClass = isPublished ? "is-approved" : "is-unpublished";
      const statusLabel = isPublished ? "published" : "unpublished";
      const featuredBadge = listing.featured ? '<span class="listing-featured-badge">featured</span>' : "";
      const chainCount = getChainCount(listing);
      const chainBadge = chainCount > 1
        ? `<span class="listing-chain-badge" title="Same name appears ${chainCount} times across all listings">chain · ${chainCount} locations</span>`
        : "";
      const coordDupCount = getCoordDuplicateCount(listing);
      const coordDupBadge = coordDupCount > 1
        ? `<span class="listing-duplicate-badge" title="Exact same coordinates as ${coordDupCount - 1} other listing(s)">duplicate coords · ${coordDupCount}</span>`
        : "";
      const placeIdDupCount = getPlaceIdDuplicateCount(listing);
      const placeIdDupBadge = placeIdDupCount > 1
        ? `<span class="listing-duplicate-badge" title="Same Google Place ID as ${placeIdDupCount - 1} other listing(s)">duplicate Place ID · ${placeIdDupCount}</span>`
        : "";
      const coordsLabel = listing.lat && listing.lng ? `${listing.lat}, ${listing.lng}` : "No coordinates";

      card.innerHTML = `
        <div class="listing-card-header">
          <div>
            <div class="listing-card-title-row">
              <h2 class="listing-card-name">${listing.name || "Untitled listing"}</h2>
              <span class="listing-status-badge ${statusClass}">${statusLabel}</span>
              ${coordDupBadge}
              ${placeIdDupBadge}
              ${chainBadge}
              ${featuredBadge}
            </div>
            <p class="listing-card-meta">${formatType(listing.type)} · ${listing.neighborhood || "—"} · ${cityLabels[listing.city] || listing.city}</p>
            <p class="listing-card-meta">${listing.address || "—"} · ${coordsLabel}</p>
            <p class="listing-card-meta">slug: ${listing.slug || "—"}</p>
          </div>
        </div>
        <div class="listing-card-actions">
          <a class="listing-btn listing-btn-view" href="/place?slug=${encodeURIComponent(listing.slug)}" target="_blank" rel="noopener noreferrer">View</a>
          <button class="listing-btn listing-btn-feature ${listing.featured ? "is-active" : ""}" type="button" data-action="feature">
            ${listing.featured ? "Unfeature" : "Feature"}
          </button>
          <button class="listing-btn ${isPublished ? "listing-btn-unpublish" : "listing-btn-publish"}" type="button" data-action="toggle-status">
            ${isPublished ? "Unpublish" : "Publish"}
          </button>
          <button class="listing-btn listing-btn-edit" type="button" data-action="edit">Edit</button>
          <button class="listing-btn listing-btn-delete" type="button" data-action="delete">Delete</button>
        </div>
        <div class="listing-edit-panel" data-edit-panel>
          <div class="listing-edit-grid">
            <div class="form-field">
              <label class="form-label">Name</label>
              <input class="form-input" data-field="name" type="text" value="${listing.name || ""}">
            </div>
            <div class="form-field">
              <label class="form-label">Slug</label>
              <input class="form-input" data-field="slug" type="text" value="${listing.slug || ""}" readonly>
            </div>
            <div class="form-field">
              <label class="form-label">Neighborhood</label>
              <input class="form-input" data-field="neighborhood" type="text" value="${listing.neighborhood || ""}">
            </div>
            <div class="form-field">
              <label class="form-label">Hours</label>
              <input class="form-input" data-field="hours" type="text" value="${listing.hours || ""}">
            </div>
            <div class="form-field" style="grid-column: 1 / -1;">
              <label class="form-label">Address</label>
              <input class="form-input" data-field="address" type="text" value="${listing.address || ""}">
            </div>
            <div class="form-field">
              <label class="form-label">Latitude</label>
              <input class="form-input" data-field="lat" type="number" step="any" value="${listing.lat || 0}">
            </div>
            <div class="form-field">
              <label class="form-label">Longitude</label>
              <input class="form-input" data-field="lng" type="number" step="any" value="${listing.lng || 0}">
            </div>
            <div class="form-field">
              <label class="form-label">Wifi network</label>
              <input class="form-input" data-field="wifiNetwork" type="text" value="${listing.wifiNetwork || ""}">
            </div>
            <div class="form-field">
              <label class="form-label">Wifi password</label>
              <input class="form-input" data-field="wifiPassword" type="text" value="${listing.wifiPassword || ""}">
            </div>
          </div>
          <div class="listing-edit-actions">
            <button class="listing-btn listing-btn-cancel" type="button" data-action="cancel-edit">Cancel</button>
            <button class="listing-btn listing-btn-save" type="button" data-action="save-edit">Save changes</button>
          </div>
        </div>
      `;

      const editPanel = card.querySelector("[data-edit-panel]");

      card.querySelector('[data-action="feature"]').addEventListener("click", async () => {
        try {
          const featured = !listing.featured;
          await updateListing(listing.id, { featured });
          listing.featured = featured;
          renderListings();
          showToast(featured ? "Listing featured." : "Listing unfeatured.");
        } catch (error) {
          console.error("Failed to toggle featured", error);
          showToast("Could not update listing.", "muted");
        }
      });

      card.querySelector('[data-action="toggle-status"]').addEventListener("click", async () => {
        try {
          const status = listing.status === "approved" ? "unpublished" : "approved";
          await updateListing(listing.id, { status });
          listing.status = status;
          renderListings();
          showToast(status === "approved" ? "Listing published." : "Listing unpublished.");
        } catch (error) {
          console.error("Failed to toggle status", error);
          showToast("Could not update listing.", "muted");
        }
      });

      card.querySelector('[data-action="edit"]').addEventListener("click", () => {
        editPanel.classList.toggle("is-open");
      });

      card.querySelector('[data-action="delete"]').addEventListener("click", async () => {
        const confirmed = window.confirm(
          `Delete “${listing.name || listing.slug}”? It will be removed from the admin list.`
        );

        if (!confirmed) {
          return;
        }

        const deleteButton = card.querySelector('[data-action="delete"]');
        deleteButton.disabled = true;
        deleteButton.textContent = "Deleting...";

        try {
          if (!listing.id) {
            throw new Error("Missing listing id");
          }

          const result = await deleteListing(listing.id);
          listings = listings.filter((item) => item.id !== listing.id);
          rebuildNameCounts();
          renderListings();
          showToast(result?.method === "soft" ? "Listing removed." : "Listing deleted.");
        } catch (error) {
          console.error("Failed to delete listing", error);
          const detail = error?.code || error?.message || "unknown error";
          showToast(`Could not delete listing (${detail}).`, "muted");
          deleteButton.disabled = false;
          deleteButton.textContent = "Delete";
        }
      });

      card.querySelector('[data-action="cancel-edit"]').addEventListener("click", () => {
        editPanel.classList.remove("is-open");
      });

      card.querySelector('[data-action="save-edit"]').addEventListener("click", async () => {
        const saveButton = card.querySelector('[data-action="save-edit"]');
        saveButton.disabled = true;
        saveButton.textContent = "Saving...";

        const updates = {
          name: card.querySelector('[data-field="name"]').value.trim(),
          neighborhood: card.querySelector('[data-field="neighborhood"]').value.trim(),
          hours: card.querySelector('[data-field="hours"]').value.trim(),
          address: card.querySelector('[data-field="address"]').value.trim(),
          lat: Number(card.querySelector('[data-field="lat"]').value) || 0,
          lng: Number(card.querySelector('[data-field="lng"]').value) || 0,
          wifiNetwork: card.querySelector('[data-field="wifiNetwork"]').value.trim(),
          wifiPassword: card.querySelector('[data-field="wifiPassword"]').value.trim()
        };

        try {
          await updateListing(listing.id, updates);
          Object.assign(listing, updates);
          rebuildNameCounts();
          editPanel.classList.remove("is-open");
          renderListings();
          showToast("Listing updated.");
        } catch (error) {
          console.error("Failed to save listing", error);
          showToast("Could not save listing.", "muted");
        } finally {
          saveButton.disabled = false;
          saveButton.textContent = "Save changes";
        }
      });

      return card;
    }

    function setActiveFilter(container, button) {
      container.querySelectorAll(".admin-filter-btn").forEach((item) => {
        item.classList.toggle("is-active", item === button);
      });
    }

    async function reverseGeocodeBatch(places) {
      const response = await fetch("/api/reverse-geocode", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(places)
      });
      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error || "Reverse geocode failed");
      }

      return data.results || [];
    }

    cityFilters.addEventListener("click", (event) => {
      const button = event.target.closest("[data-city]");
      if (!button) {
        return;
      }

      activeCity = button.dataset.city;
      activeNeighborhood = "all";
      setActiveFilter(cityFilters, button);
      renderListings();
    });

    statusFilters.addEventListener("click", (event) => {
      const button = event.target.closest("[data-status]");
      if (!button) {
        return;
      }

      activeStatus = button.dataset.status;
      activeNeighborhood = "all";
      setActiveFilter(statusFilters, button);
      renderListings();
    });

    chainFilters.addEventListener("click", (event) => {
      const button = event.target.closest("[data-chain]");
      if (!button) {
        return;
      }

      activeChain = button.dataset.chain;
      activeNeighborhood = "all";
      setActiveFilter(chainFilters, button);
      renderListings();
    });

    duplicateFilters.addEventListener("click", (event) => {
      const button = event.target.closest("[data-duplicate]");
      if (!button) {
        return;
      }

      activeDuplicate = button.dataset.duplicate;
      activeNeighborhood = "all";
      setActiveFilter(duplicateFilters, button);
      renderListings();
    });

    neighborhoodFilters.addEventListener("click", (event) => {
      const button = event.target.closest("[data-neighborhood]");
      if (!button) {
        return;
      }

      activeNeighborhood = button.dataset.neighborhood;
      renderListings();
    });

    fillNeighborhoodsBtn.addEventListener("click", async () => {
      const targets = getFilteredListings().filter(
        (listing) => !listing.neighborhood?.trim() && listing.lat && listing.lng
      );

      if (!targets.length) {
        showToast("No listings need a neighborhood fill.", "muted");
        return;
      }

      fillNeighborhoodsBtn.disabled = true;
      fillNeighborhoodsBtn.textContent = "Filling neighborhoods...";
      listingsSummary.textContent = `Filling neighborhoods: 0 / ${targets.length}`;

      let filled = 0;
      let lastError = "";

      try {
        for (let start = 0; start < targets.length; start += NEIGHBORHOOD_BATCH_SIZE) {
          const chunk = targets.slice(start, start + NEIGHBORHOOD_BATCH_SIZE);
          const results = await reverseGeocodeBatch(
            chunk.map((listing) => ({ lat: listing.lat, lng: listing.lng }))
          );

          for (let index = 0; index < chunk.length; index += 1) {
            const listing = chunk[index];
            const result = results[index] || {};
            const neighborhood = (result.neighborhood || "").trim();
            const address = (result.address || "").trim();

            if (result.error && !neighborhood && !address) {
              lastError = result.error;
            }

            if (!neighborhood && !address) {
              continue;
            }

            const updates = {};
            if (neighborhood) {
              updates.neighborhood = neighborhood;
            }
            if (address && !listing.address) {
              updates.address = address;
            }

            if (!Object.keys(updates).length) {
              continue;
            }

            await updateListing(listing.id, updates);
            Object.assign(listing, updates);
            filled += 1;
          }

          listingsSummary.textContent = `Filling neighborhoods: ${Math.min(start + chunk.length, targets.length)} / ${targets.length}`;
          activeNeighborhood = "all";
          renderListings();
          await new Promise((resolve) => window.setTimeout(resolve, 1100));
        }

        activeNeighborhood = "all";
        renderListings();

        if (filled) {
          showToast(`Filled neighborhoods for ${filled} listing${filled === 1 ? "" : "s"}.`);
        } else {
          showToast(lastError ? `Could not fill neighborhoods (${lastError}).` : "No neighborhoods found.", "muted");
        }
      } catch (error) {
        console.error("Neighborhood fill failed", error);
        showToast(error.message || "Neighborhood fill failed.", "muted");
      } finally {
        fillNeighborhoodsBtn.disabled = false;
        fillNeighborhoodsBtn.textContent = "Fill missing neighborhoods";
        updateCount();
      }
    });

    deleteCoordDupesBtn.addEventListener("click", async () => {
      const scopeListings = getCityStatusFiltered();
      const toDelete = getCoordinateDuplicateRemovals(scopeListings);

      if (!toDelete.length) {
        showToast("No coordinate duplicates in the current city/status filters.", "muted");
        return;
      }

      const groupCount = new Set(toDelete.map((listing) => coordKey(listing))).size;
      const confirmed = window.confirm(
        `Delete ${toDelete.length} duplicate listing${toDelete.length === 1 ? "" : "s"} across ${groupCount} coordinate${groupCount === 1 ? "" : "s"}?\n\nKeeps the best copy at each location (prefers published + more complete data).`
      );

      if (!confirmed) {
        return;
      }

      deleteCoordDupesBtn.disabled = true;
      fillNeighborhoodsBtn.disabled = true;
      deleteCoordDupesBtn.textContent = "Deleting duplicates...";

      let deleted = 0;
      let failed = 0;
      const deletedIds = new Set();

      try {
        for (let index = 0; index < toDelete.length; index += 1) {
          const listing = toDelete[index];
          listingsSummary.textContent = `Deleting duplicates: ${index + 1} / ${toDelete.length}`;

          try {
            await deleteListing(listing.id);
            deletedIds.add(listing.id);
            deleted += 1;
          } catch (error) {
            console.error("Failed to delete duplicate", listing.id, error);
            failed += 1;
          }
        }

        listings = listings.filter((listing) => !deletedIds.has(listing.id));
        rebuildNameCounts();
        activeDuplicate = "all";
        activeNeighborhood = "all";
        setActiveFilter(duplicateFilters, duplicateFilters.querySelector('[data-duplicate="all"]'));
        renderListings();

        if (failed) {
          showToast(`Removed ${deleted} duplicate${deleted === 1 ? "" : "s"} · ${failed} failed.`, "muted");
        } else {
          showToast(`Removed ${deleted} coordinate duplicate${deleted === 1 ? "" : "s"}.`);
        }
      } catch (error) {
        console.error("Bulk duplicate delete failed", error);
        showToast(error.message || "Bulk delete failed.", "muted");
      } finally {
        deleteCoordDupesBtn.disabled = false;
        fillNeighborhoodsBtn.disabled = false;
        deleteCoordDupesBtn.textContent = "Delete coordinate duplicates";
        updateCount();
      }
    });

    async function loadListings() {
      listingsList.innerHTML = `<p class="admin-queue-count">Loading listings...</p>`;

      try {
        listings = await getAdminListings();
        rebuildNameCounts();
        renderListings();
      } catch (error) {
        console.error("Failed to load listings", error);
        listingsList.innerHTML = "";
        const errorState = document.createElement("div");
        errorState.className = "admin-queue-empty";
        const message = document.createElement("p");
        message.textContent = "Unable to load listings. Try a hard refresh (Cmd+Shift+R).";
        errorState.appendChild(message);
        listingsList.appendChild(errorState);
      }
    }

    loadListings();
  </script>
</body>
</html>
